<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロット錬成アプリ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23cd5c5c'/><text x='50%25' y='55%25' font-family='sans-serif' font-size='100' text-anchor='middle' dominant-baseline='middle'>📝</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --primary: #cd5c5c; /* メイン文字色：コーラルレッド */
            --bg: #1e222b;      /* ダークモード背景 */
            --card: #282c34;
            --box-bg: #21252b;   /* 各構成ボックスの背景 */
            --text: #ffffff;
            --text-muted: #abb2bf;
            --border: #3e4451;
            --accent-star: #f1c40f;
            --accent-heart: #ff7675;
        }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 550px; padding-bottom: 60px; }
        
        h1 { text-align: center; color: var(--primary); font-size: 1.6rem; margin: 10px 0 20px 0; font-weight: bold; }
        h2 { font-size: 1.1rem; color: var(--primary); margin: 0 0 15px 0; border-left: 4px solid var(--primary); padding-left: 8px; font-weight: bold; }
        
        .card { background: var(--card); padding: 18px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        
        /* 共通入力UI */
        select, input[type="text"], input[type="number"], textarea { 
            background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 10px; font-size: 0.95rem; width: 100%; 
        }
        select:focus, input:focus, textarea:focus { outline: 1px solid var(--primary); }
        
        /* 1階：文字数入力行 */
        .char-count-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 10px; }
        .char-label { font-size: 0.95rem; color: var(--primary); font-weight: bold; width: 80px; }
        
        /* カスタム追加ボタンエリア */
        .custom-add-area { display: flex; gap: 8px; margin-top: 12px; }
        
        /* 2階：要素の平打ち */
        .checkbox-group { display: flex; gap: 15px; margin: 10px 0; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 0.95rem; cursor: pointer; }
        .checkbox-label input { width: 18px; height: 18px; cursor: pointer; }
        
        /* 縦並び構成ボックス */
        .section-box { background: var(--box-bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 15px; }
        .section-title { font-size: 1.05rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; }
        .section-count { font-size: 0.8rem; color: var(--text-muted); }
        
        /* 投入された要素ピース */
        .plot-piece { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 10px; }
        .piece-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .piece-text { font-size: 0.95rem; word-break: break-all; white-space: pre-wrap; flex-grow: 1; }
        .piece-badges { display: flex; gap: 6px; font-size: 0.8rem; margin-top: -4px; }
        .badge { padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .badge-star { background: rgba(241, 196, 15, 0.15); color: var(--accent-star); border: 1px solid var(--accent-star); }
        .badge-heart { background: rgba(255, 118, 117, 0.15); color: var(--accent-heart); border: 1px solid var(--accent-heart); }
        
        /* コントロール行（分類変更プルダウン ＋ 移動ボタン） */
        .piece-controls { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; gap: 8px; }
        .change-select { width: auto; max-width: 130px; padding: 4px 8px; font-size: 0.85rem; }
        .actions { display: flex; gap: 4px; }
        
        /* ボタン類 */
        button { background: var(--primary); color: white; border: none; border-radius: 6px; padding: 10px 16px; font-weight: bold; cursor: pointer; font-size: 0.95rem; }
        button:strong { opacity: 0.8; }
        .btn-block { width: 100%; display: block; }
        .btn-sm { padding: 4px 8px; font-size: 0.8rem; }
        .btn-gray { background: #4b5263; }
        .btn-danger { background: #ff7675; }
        
        .flex-buttons { display: flex; gap: 10px; margin-bottom: 12px; }
        .flex-buttons button { flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 プロット錬成アプリ</h1>

    <div class="card">
        <h2>1階：構成と想定文字数の設定</h2>
        <label style="font-size:0.9rem; color:var(--text-muted); display:block; margin-bottom:6px;">構成テンプレート</label>
        <select id="structure-type" onchange="onChangeStructure(this.value)">
            <option value="序破急">序破急</option>
            <option value="起承転結">起承転結</option>
            <option value="カスタム">カスタム（自由追加）</option>
        </select>

        <div id="char-inputs-container" style="margin-top: 10px;"></div>
        
        <div id="custom-add-form" class="custom-add-area" style="display:none;">
            <input type="text" id="new-custom-label" placeholder="新しい構成幕の名（例: 転の2）" style="flex-grow:1;">
            <button class="btn-sm" onclick="addCustomSection()">幕を追加</button>
        </div>
    </div>

    <div class="card">
        <h2>2階：要素の平打ちと配置・順序入れ替え</h2>
        <div class="input-area">
            <label style="font-size:0.9rem; color:var(--text-muted); display:block; margin-bottom:6px;">要素の内容（シーン・セリフ・メモなど）</label>
            <textarea id="new-plot-text" placeholder="思いついたことを平打ちしてください" rows="3"></textarea>
            
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-star"> ⭐️ 盛り上がるシーン
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-heart"> ❤️ 一番書きたい要素
                </label>
            </div>
            
            <button class="btn-block" onclick="onAddPlot()">要素を追加</button>
        </div>
    </div>

    <div id="board-container"></div>

    <div class="card">
        <h2>3階：プロット錬成</h2>
        <div class="flex-buttons">
            <button onclick="generatePlotText()">🚀 プロット錬成</button>
            <button class="btn-gray" onclick="saveToLocalStorage()">💾 保存</button>
        </div>
        
        <label style="font-size:0.9rem; color:var(--text-muted); display:block; margin-bottom:6px;">錬成結果（そのままコピペ可能です）</label>
        <textarea id="result-textarea" placeholder="ボタンを押すとここにプロットが書き出されます" rows="8" readonly onclick="this.select()"></textarea>
    </div>
</div>

<script>
    // 全データ保持用
    let allPlots = [];
    let currentSections = ["序", "破", "急"];
    let wordCounts = { "序": "", "破": "", "急": "", "起": "", "承": "", "転": "", "結": "" };

    window.onload = function() {
        // キャッシュから復元
        const savedPlots = localStorage.getItem('plot_v2_items');
        const savedSections = localStorage.getItem('plot_v2_sections');
        const savedCounts = localStorage.getItem('plot_v2_counts');
        const savedType = localStorage.getItem('plot_v2_type');

        if (savedPlots) allPlots = JSON.parse(savedPlots);
        if (savedCounts) wordCounts = JSON.parse(savedCounts);
        
        if (savedType) {
            document.getElementById('structure-type').value = savedType;
            if (savedType === "カスタム" && savedSections) {
                currentSections = JSON.parse(savedSections);
            } else {
                setTemplateSections(savedType);
            }
        } else {
            setTemplateSections("序破急");
        }

        renderAll();
    };

    function saveToLocalStorage() {
        localStorage.setItem('plot_v2_items', JSON.stringify(allPlots));
        localStorage.setItem('plot_v2_sections', JSON.stringify(currentSections));
        localStorage.setItem('plot_v2_counts', JSON.stringify(wordCounts));
        localStorage.setItem('plot_v2_type', document.getElementById('structure-type').value);
        alert("ブラウザに現在のプロットデータを保存しました！💾");
    }

    function setTemplateSections(type) {
        if (type === "序破急") {
            currentSections = ["序", "破", "急"];
        } else if (type === "起承転結") {
            currentSections = ["起", "承", "転", "結"];
        }
    }

    function onChangeStructure(val) {
        const customForm = document.getElementById('custom-add-form');
        if (val === "カスタム") {
            customForm.style.display = 'flex';
            // カスタム切り替え時は直前のものを引き継ぐか空にする
            currentSections = currentSections.filter(s => !["序","破","急","起","承","転","結"].includes(s));
            if(currentSections.length === 0) currentSections = ["要素1", "要素2"];
        } else {
            customForm.style.display = 'none';
            setTemplateSections(val);
        }
        renderAll();
    }

    // カスタム構成幕の追加
    function addCustomSection() {
        const input = document.getElementById('new-custom-label');
        const name = input.value.trim();
        if (!name) return;
        if (currentSections.includes(name)) {
            alert("既に同じ名前の構成幕があります！");
            return;
        }
        currentSections.push(name);
        if (!wordCounts[name]) wordCounts[name] = "";
        input.value = '';
        renderAll();
    }

    // 1階の文字数入力を記憶する
    function updateWordCount(sec, val) {
        wordCounts[sec] = val;
    }

    function renderAll() {
        renderCharInputs();
        renderBoard();
    }

    // 1階：文字数入力欄の生成
    function renderCharInputs() {
        const container = document.getElementById('char-inputs-container');
        container.innerHTML = '';

        currentSections.forEach(sec => {
            const row = document.createElement('div');
            row.className = 'char-count-row';
            
            const label = document.createElement('div');
            label.className = 'char-label';
            label.innerText = `【${sec}】`;
            
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = '例: 2000字';
            input.value = wordCounts[sec] || '';
            input.style.flexGrow = '1';
            input.oninput = (e) => updateWordCount(sec, e.target.value);
            
            row.appendChild(label);
            row.appendChild(input);
            container.appendChild(row);
        });
    }

    // 2階：平打ち追加
    function onAddPlot() {
        const textarea = document.getElementById('new-plot-text');
        const text = textarea.value.trim();
        if (!text) return;

        const isStar = document.getElementById('chk-star').checked;
        const isHeart = document.getElementById('chk-heart').checked;

        // 新規投入時は最初は必ず「未分類」にする
        const id = "pl_" + Date.now();
        
        allPlots.push({
            id: id,
            text: text,
            section: "未分類",
            isStar: isStar,
            isHeart: isHeart,
            order: Date.now()
        });

        // フォームリセット
        textarea.value = '';
        document.getElementById('chk-star').checked = false;
        document.getElementById('chk-heart').checked = false;

        renderBoard();
    }

    // 2階：各構成幕ボックス＆要素の描画
    function renderBoard() {
        const container = document.getElementById('board-container');
        container.innerHTML = '';

        // 「未分類」および現在のすべての構成幕のリストを作る
        const boxesToRender = ["未分類", ...currentSections];

        boxesToRender.forEach(secName => {
            // 未分類にデータがなくて、通常の構成幕がある場合はそのまま出すが、
            // 未分類にデータがない場合は未分類ボックス自体を非表示にする
            const secPlots = allPlots.filter(p => p.section === secName);
            if (secName === "未分類" && secPlots.length === 0) return;

            const box = document.createElement('div');
            box.className = 'section-box';
            if (secName === "未分類") box.style.borderColor = '#abb2bf';

            const header = document.createElement('div');
            header.className = 'section-title';
            if (secName === "未分類") header.style.color = '#abb2bf';
            
            header.innerHTML = `<span>【${secName}】</span><span class="section-count">${secPlots.length} 件</span>`;
            box.appendChild(header);

            // 表示順にソート（order順）
            secPlots.sort((a, b) => a.order - b.order);

            if (secPlots.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.style = 'font-size:0.85rem; color:var(--text-muted); text-align:center; padding:10px;';
                emptyMsg.innerText = '投入された要素のリストと整理';
                box.appendChild(emptyMsg);
            } else {
                secPlots.forEach((p, idx) => {
                    const piece = document.createElement('div');
                    piece.className = 'plot-piece';

                    // テキスト部分とバッジ
                    const headerRow = document.createElement('div');
                    headerRow.className = 'piece-header';
                    
                    const txt = document.createElement('div');
                    txt.className = 'piece-text';
                    txt.innerText = p.text;
                    headerRow.appendChild(txt);

                    // 削除ボタン
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn-sm btn-danger';
                    delBtn.innerText = '×';
                    delBtn.onclick = () => {
                        allPlots = allPlots.filter(item => item.id !== p.id);
                        renderBoard();
                    };
                    headerRow.appendChild(delBtn);
                    piece.appendChild(headerRow);

                    // 属性バッジ
                    if (p.isStar || p.isHeart) {
                        const badges = document.createElement('div');
                        badges.className = 'piece-badges';
                        if (p.isStar) badges.innerHTML += `<span class="badge badge-star">⭐️ 盛り上がるシーン</span>`;
                        if (p.isHeart) badges.innerHTML += `<span class="badge badge-heart">❤️ 一番書きたい要素</span>`;
                        piece.appendChild(badges);
                    }

                    // 下部コントロール（分類変更と▲▼）
                    const controls = document.createElement('div');
                    controls.className = 'piece-controls';

                    // 分類変更セレクト
                    const sel = document.createElement('select');
                    sel.className = 'change-select';
                    
                    // 「指定なし（未分類）」の選択肢
                    const optNone = document.createElement('option');
                    optNone.value = "未分類"; optNone.innerText = "- 分類選択 -";
                    if(p.section === "未分類") optNone.selected = true;
                    sel.appendChild(optNone);

                    currentSections.forEach(sec => {
                        const opt = document.createElement('option');
                        opt.value = sec;
                        opt.innerText = sec;
                        if(p.section === sec) opt.selected = true;
                        sel.appendChild(opt);
                    });
                    sel.onchange = (e) => changePieceSection(p.id, e.target.value);
                    controls.appendChild(sel);

                    // ▲▼移動ボタン
                    const acts = document.createElement('div');
                    acts.className = 'actions';

                    const upBtn = document.createElement('button');
                    upBtn.className = 'btn-sm btn-gray';
                    upBtn.innerText = '▲';
                    if (idx === 0) { upBtn.disabled = true; upBtn.style.opacity = 0.3; }
                    else { upBtn.onclick = () => moveOrder(secName, idx, idx - 1); }
                    acts.appendChild(upBtn);

                    const downBtn = document.createElement('button');
                    downBtn.className = 'btn-sm btn-gray';
                    downBtn.innerText = '▼';
                    if (idx === secPlots.length - 1) { downBtn.disabled = true; downBtn.style.opacity = 0.3; }
                    else { downBtn.onclick = () => moveOrder(secName, idx, idx + 1); }
                    acts.appendChild(downBtn);

                    controls.appendChild(acts);
                    piece.appendChild(controls);

                    box.appendChild(piece);
                });
            }

            container.appendChild(box);
        });
    }

    // 分類が変更された時、そのボックスの一番最後に配置する
    function changePieceSection(id, newSec) {
        const item = allPlots.find(p => p.id === id);
        if (item) {
            item.section = newSec;
            item.order = Date.now(); // 一番最後に送る
            renderBoard();
        }
    }

    // ボックス内での順序入れ替え
    function moveOrder(secName, fromIdx, toIdx) {
        let secPlots = allPlots.filter(p => p.section === secName).sort((a, b) => a.order - b.order);
        
        const target = secPlots[fromIdx];
        secPlots.splice(fromIdx, 1);
        secPlots.splice(toIdx, 0, target);

        // orderを新インデックスで上書き再採番
        secPlots.forEach((p, idx) => {
            p.order = idx + 1;
        });

        renderBoard();
    }

    // 3階：プロット錬成テキスト出力
    function generatePlotText() {
        let res = "";
        
        currentSections.forEach(sec => {
            const countStr = wordCounts[sec] ? ` （想定: ${wordCounts[sec]}）` : "";
            res += `■ ${sec}${countStr}\n`;
            res += `----------------------------------------\n`;
            
            const secPlots = allPlots.filter(p => p.section === sec).sort((a, b) => a.order - b.order);
            if (secPlots.length === 0) {
                res += `（要素がありません）\n`;
            } else {
                secPlots.forEach((p, idx) => {
                    let prefix = "";
                    if (p.isStar) prefix += "[⭐️盛り上がる] ";
                    if (p.isHeart) prefix += "[❤️一番書きたい] ";
                    res += `${idx + 1}. ${prefix}${p.text}\n`;
                });
            }
            res += `\n`;
        });

        document.getElementById('result-textarea').value = res;
    }
</script>

</body>
</html>
